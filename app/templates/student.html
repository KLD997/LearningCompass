<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Student Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css"/>
  <script>
    async function markComplete(id) {
      await fetch(`/api/assignments/${id}/complete`, { method: 'POST' });
      window.location.reload();
    }
  </script>
</head>
<body>
  <main class="container">
    <header class="header-row">
      <h1>Hi $student_name 👋</h1>
      <a class="btn" href="/parent">Parent View</a>
    </header>

    <section class="card">
      <h2>Today's Lesson Queue</h2>
      <div class="progress-wrap">
        <div class="progress-bar"><span style="width: $progress%"></span></div>
        <p>$progress% complete</p>
      </div>
      <table>
        <thead><tr><th>Lesson</th><th>Subject</th><th>Minutes</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>$lesson_rows</tbody>
      </table>
    </section>
  </main>
</body>
</html>
